<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopConfigIR - مدیریت</title>
<style>
:root{--bg:#080c18;--card:#111b2e;--border:#1e3050;--text:#e8edf5;--text2:#6a7fa0;--accent:#00c8ff;--accent2:#0066ff;--radius:12px;--shadow:0 8px 32px rgba(0,0,0,0.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:15px}
.app{max-width:1200px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:10px}
.logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:#1a2640;border:1px solid var(--border);color:var(--text2);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:12px;transition:all 0.3s}
.btn:hover{background:#1e3050;border-color:var(--accent);color:#fff}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.btn-primary:hover{opacity:0.85}
.btn-danger{background:#4a1520;border-color:#6a2030;color:#f87171}
.btn-danger:hover{background:#6a2030}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-success{background:#0a3a1a;border-color:#1a5a2a;color:#4ade80}
.btn-success:hover{background:#1a5a2a}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:all 0.3s}
.stat:hover{border-color:var(--accent)}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:22px;font-weight:700;margin-top:2px}
.stat-value .g{color:#4ade80}
.stat-value .r{color:#f87171}
.stat-value .y{color:#fbbf24}
.stat-value .a{color:var(--accent)}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.toolbar input{background:#0a1222;border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:#fff;font-size:12px;outline:none;width:160px}
.toolbar input:focus{border-color:var(--accent)}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:right;padding:8px 10px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);font-size:11px}
.table td{padding:8px 10px;border-bottom:1px solid #0f1a2a;vertical-align:middle}
.table tr:hover td{background:#0a1222}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:500}
.badge-active{background:#0a2a1a;color:#4ade80}
.badge-paused{background:#2a1a0a;color:#fbbf24}
.badge-expired{background:#2a0a0a;color:#f87171}
.empty{text-align:center;color:var(--text2);padding:25px 0;font-size:13px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:92%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-content h3{font-size:17px;margin-bottom:14px;color:var(--text)}
.modal-content label{display:block;color:var(--text2);font-size:12px;margin:8px 0 4px}
.modal-content input,.modal-content select{width:100%;padding:8px 12px;background:#0a1222;border:1px solid var(--border);border-radius:6px;color:#fff;font-size:13px;outline:none;margin-bottom:6px}
.modal-content input:focus,.modal-content select:focus{border-color:var(--accent)}
.modal-content .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-content .info-text{font-size:12px;color:var(--text2);margin:4px 0 8px}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:6px;border:none;font-size:13px;cursor:pointer}
.modal-actions .save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.modal-actions .cancel{background:#1a2640;color:var(--text2);border:1px solid var(--border)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:var(--radius);color:var(--text);z-index:1000;display:none;box-shadow:var(--shadow);font-size:13px;max-width:90%}
.toast.show{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.table{font-size:11px}.table td,.table th{padding:4px 5px;font-size:10px}.modal-content{padding:16px}.modal-content .row{grid-template-columns:1fr}.btn-sm{padding:2px 6px;font-size:9px}}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="logo">⚡ TopConfigIR</div>
<div class="header-actions">
<button class="btn" onclick="openChangePassword()">🔑 تغییر رمز</button>
<button class="btn btn-success" onclick="refreshData()">🔄 بروزرسانی</button>
<button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
</div>
</div>

<div class="stats">
<div class="stat"><div class="stat-label">👥 کاربران کل</div><div class="stat-value" id="totalUsers">0</div></div>
<div class="stat"><div class="stat-label">🟢 فعال</div><div class="stat-value"><span class="g" id="activeUsers">0</span></div></div>
<div class="stat"><div class="stat-label">🟡 متوقف</div><div class="stat-value"><span class="y" id="pausedUsers">0</span></div></div>
<div class="stat"><div class="stat-label">🔴 منقضی</div><div class="stat-value"><span class="r" id="expiredUsers">0</span></div></div>
<div class="stat"><div class="stat-label">📊 ترافیک کل</div><div class="stat-value"><span class="a" id="totalTraffic">0 GB</span></div></div>
</div>

<div class="section">
<div class="toolbar">
<div class="section-title" style="margin-bottom:0">📋 لیست کاربران</div>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<input id="searchInput" placeholder="جستجو...">
<button class="btn btn-primary btn-sm" onclick="openAddUser()">➕ افزودن</button>
</div>
</div>
<div id="usersContainer"><div class="empty">در حال بارگذاری...</div></div>
</div>
</div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
let users = [];
let currentPassword = '123';
let editingUserId = null;
let usageStore = {};

async function apiFetch(path, options={}){
    try {
        const url = path.includes('?') ? path + '&key=' + currentPassword : path + '?key=' + currentPassword;
        const res = await fetch(url, {
            ...options,
            headers:{'Content-Type':'application/json', ...(options.headers||{})}
        });
        return await res.json();
    } catch(e) {
        return { success: false, error: 'Network error' };
    }
}

async function loadData(){
    try {
        const data = await apiFetch('/api/users');
        if(data && data.success) {
            users = data.users || [];
            render();
            updateStats();
        } else {
            showToast('⚠️ خطا در دریافت لیست کاربران');
            users = [];
            render();
            updateStats();
        }
    } catch(e) {
        showToast('❌ خطا در ارتباط با سرور');
        users = [];
        render();
        updateStats();
    }
    try {
        const stats = await apiFetch('/api/stats');
        if(stats && stats.success && stats.usage) {
            usageStore = stats.usage;
        }
    } catch(e) {}
}

function render(){
    const container = document.getElementById('usersContainer');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = users.filter(u => u.name.toLowerCase().includes(search) || u.id.toLowerCase().includes(search));
    if(!filtered.length){ container.innerHTML='<div class="empty">هیچ کاربری یافت نشد</div>'; return; }
    let html=`<table class="table"><thead><tr><th>نام</th><th>شناسه</th><th>وضعیت</th><th>مصرف</th><th>انقضا</th><th>عملیات</th></tr></thead><tbody>`;
    filtered.forEach(u=>{
        const status = u.isPaused ? 'badge-paused' : (u.expiryMs && Date.now()>u.expiryMs ? 'badge-expired' : 'badge-active');
        const statusText = u.isPaused ? 'متوقف' : (u.expiryMs && Date.now()>u.expiryMs ? 'منقضی' : 'فعال');
        const used = u.usage?.total ? (u.usage.total/1073741824).toFixed(2) : '0';
        const limit = u.limitTotalReq ? (u.limitTotalReq/6000).toFixed(2) : '∞';
        const expiry = u.expiryMs ? new Date(u.expiryMs).toLocaleDateString('fa-IR') : '∞';
        const subUrl = window.location.origin + '/subscription?user=' + encodeURIComponent(u.name);
        html+=`<tr><td><strong>${u.name}</strong></td><td style="font-size:11px;color:var(--text2)">${u.id.substring(0,8)}...</td><td><span class="badge ${status}">${statusText}</span></td><td>${used}/${limit} GB</td><td>${expiry}</td><td style="white-space:nowrap">
        <button class="btn btn-sm" onclick="copySubUrl('${subUrl}')" title="کپی لینک اشتراک">🔗</button>
        <button class="btn btn-sm" onclick="editUser('${u.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">🗑️</button>
        <button class="btn btn-sm" onclick="toggleUser('${u.id}')">${u.isPaused?'▶️':'⏸️'}</button>
        </td></tr>`;
    });
    html+='</tbody></table>';
    container.innerHTML=html;
}

function updateStats(){
    const total = users.length;
    const active = users.filter(u => !u.isPaused && (!u.expiryMs || Date.now()<=u.expiryMs)).length;
    const paused = users.filter(u => u.isPaused && !u.disabledReason).length;
    const expired = users.filter(u => u.expiryMs && Date.now()>u.expiryMs && !u.isPaused).length;
    let traffic = 0;
    users.forEach(u=>{ const id=u.id.replace(/-/g,'').toLowerCase(); if(usageStore[id]) traffic += usageStore[id].reqs||0; });
    document.getElementById('totalUsers').textContent=total;
    document.getElementById('activeUsers').textContent=active;
    document.getElementById('pausedUsers').textContent=paused;
    document.getElementById('expiredUsers').textContent=expired;
    document.getElementById('totalTraffic').textContent=(traffic/6000).toFixed(2)+' GB';
}

function copySubUrl(url){
    navigator.clipboard?.writeText(url).then(()=>showToast('✅ لینک اشتراک کپی شد!'))
    .catch(()=>{ const ta=document.createElement('textarea'); ta.value=url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast('✅ لینک کپی شد!'); });
}

function openAddUser(){
    editingUserId=null;
    document.getElementById('modalContent').innerHTML=`
        <h3>➕ افزودن کاربر جدید</h3>
        <label>نام کاربر</label><input id="fName" placeholder="نام کاربر">
        <label>محدودیت ترافیک کل (GB) - خالی = نامحدود</label><input id="fTraffic" type="number" placeholder="مثلاً 10">
        <label>محدودیت روزانه (GB) - خالی = نامحدود</label><input id="fDaily" type="number" placeholder="مثلاً 1">
        <label>مدت اعتبار (روز) - خالی = نامحدود</label><input id="fDays" type="number" placeholder="مثلاً 30">
        <div class="info-text">⚠️ برای نامحدود، فیلد را خالی بگذارید</div>
        <div class="modal-actions">
            <button class="save" onclick="saveUser()">✅ ذخیره</button>
            <button class="cancel" onclick="closeModal()">❌ انصراف</button>
        </div>
    `;
    document.getElementById('modal').style.display='flex';
}

async function saveUser(){
    const name=document.getElementById('fName').value.trim();
    if(!name){ showToast('❌ نام کاربر الزامی است'); return; }
    const traffic=parseFloat(document.getElementById('fTraffic').value)||0;
    const daily=parseFloat(document.getElementById('fDaily').value)||0;
    const days=parseInt(document.getElementById('fDays').value)||0;
    const body={name, trafficLimit: traffic, dailyLimit: daily, expiryDays: days, key: currentPassword};
    const url=editingUserId ? `/api/users?id=${editingUserId}` : '/api/users';
    const method=editingUserId ? 'PUT' : 'POST';
    try {
        const data=await apiFetch(url, {method, body: JSON.stringify(body)});
        if(data.success){ 
            showToast(editingUserId?'✅ ویرایش شد!':'✅ کاربر افزوده شد!'); 
            closeModal(); 
            loadData(); 
        } else {
            showToast('❌ خطا: '+ (data.error||'نامشخص'));
        }
    } catch(e) { 
        showToast('❌ خطا در ارتباط با سرور'); 
    }
}

function editUser(id){
    const u=users.find(x=>x.id===id);
    if(!u) return;
    editingUserId=id;
    document.getElementById('modalContent').innerHTML=`
        <h3>✏️ ویرایش کاربر</h3>
        <label>نام کاربر</label><input id="fName" value="${u.name}">
        <label>محدودیت ترافیک کل (GB)</label><input id="fTraffic" type="number" value="${u.limitTotalReq?(u.limitTotalReq/6000).toFixed(2):''}">
        <label>محدودیت روزانه (GB)</label><input id="fDaily" type="number" value="${u.limitDailyReq?(u.limitDailyReq/6000).toFixed(2):''}">
        <label>تمدید اعتبار (روز)</label><input id="fDays" type="number" placeholder="0 برای بدون تغییر">
        <div class="info-text">💡 برای تمدید، تعداد روز اضافه کنید. برای نامحدود خالی بگذارید.</div>
        <div class="modal-actions">
            <button class="save" onclick="saveUser()">✅ ذخیره</button>
            <button class="cancel" onclick="closeModal()">❌ انصراف</button>
        </div>
    `;
    document.getElementById('modal').style.display='flex';
}

async function deleteUser(id){
    if(!confirm('⚠️ آیا از حذف این کاربر اطمینان دارید؟')) return;
    try {
        const data=await apiFetch(`/api/users?id=${id}`, {method:'DELETE', body:JSON.stringify({key:currentPassword})});
        if(data.success){ showToast('🗑️ کاربر حذف شد!'); loadData(); }
        else showToast('❌ خطا در حذف');
    } catch(e) { showToast('❌ خطا در ارتباط با سرور'); }
}

async function toggleUser(id){
    try {
        const data=await apiFetch(`/api/users?id=${id}&action=toggle`, {method:'POST', body:JSON.stringify({key:currentPassword})});
        if(data.success){ showToast('✅ وضعیت تغییر کرد!'); loadData(); }
        else showToast('❌ خطا');
    } catch(e) { showToast('❌ خطا'); }
}

function openChangePassword(){
    document.getElementById('modalContent').innerHTML=`
        <h3>🔑 تغییر رمز عبور</h3>
        <label>رمز فعلی</label><input id="oldPass" type="password">
        <label>رمز جدید (حداقل ۳ کاراکتر)</label><input id="newPass" type="password">
        <label>تکرار رمز جدید</label><input id="confirmPass" type="password">
        <div class="modal-actions">
            <button class="save" onclick="changePassword()">✅ تغییر</button>
            <button class="cancel" onclick="closeModal()">❌ انصراف</button>
        </div>
    `;
    document.getElementById('modal').style.display='flex';
}

async function changePassword(){
    const old=document.getElementById('oldPass').value;
    const np=document.getElementById('newPass').value;
    const cf=document.getElementById('confirmPass').value;
    if(old!==currentPassword){ showToast('❌ رمز فعلی اشتباه است'); return; }
    if(np.length<3){ showToast('❌ رمز جدید حداقل ۳ کاراکتر'); return; }
    if(np!==cf){ showToast('❌ رمزها مطابقت ندارند'); return; }
    try {
        const data=await apiFetch('/api/auth', {method:'POST', body:JSON.stringify({oldKey:old, newKey:np})});
        if(data.success){ currentPassword=np; showToast('✅ رمز با موفقیت تغییر کرد!'); closeModal(); }
        else showToast('❌ خطا در تغییر رمز');
    } catch(e) { showToast('❌ خطا'); }
}

function refreshData(){ showToast('🔄 در حال بروزرسانی...'); loadData(); }
function logout(){ if(confirm('🚪 آیا از خروج اطمینان دارید؟')) window.location.href='/'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; clearTimeout(t._timeout); t._timeout=setTimeout(()=>t.className='toast',3000); }

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

loadData();
</script>
</body>
</html>
