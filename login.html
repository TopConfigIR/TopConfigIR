<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopConfigIR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#080c18;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login{background:#111b2e;padding:40px;border-radius:20px;border:1px solid #1e3050;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.login h1{font-size:26px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px}
.login .sub{text-align:center;color:#6a7fa0;font-size:13px;margin-bottom:30px}
.login label{color:#b0c4e0;font-size:13px;font-weight:500;display:block;margin-bottom:6px}
.login input{width:100%;padding:12px 16px;background:#0a1222;border:1px solid #1e3050;border-radius:10px;color:#fff;font-size:15px;outline:none;transition:border 0.3s}
.login input:focus{border-color:#00c8ff}
.login .field{margin-bottom:18px}
.login button{width:100%;padding:14px;background:linear-gradient(135deg,#00c8ff,#0066ff);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.3s}
.login button:hover{opacity:0.85}
.login .error{color:#f87171;font-size:13px;text-align:center;margin-top:12px;display:none}
.logo{text-align:center;margin-bottom:20px}
.logo span{font-size:28px;font-weight:800;background:linear-gradient(135deg,#00c8ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
<div class="login">
<div class="logo"><span>TopConfigIR</span></div>
<h1>ورود به پنل</h1>
<p class="sub">سیستم مدیریت کانفیگ</p>
<form id="loginForm">
<div class="field">
<label>نام کاربری</label>
<input type="text" id="username" value="TopConfigIR" readonly>
</div>
<div class="field">
<label>رمز عبور</label>
<input type="password" id="password" placeholder="رمز عبور را وارد کنید">
</div>
<button type="submit">ورود</button>
<div class="error" id="error">نام کاربری یا رمز عبور اشتباه است</div>
</form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
e.preventDefault();
const pass = document.getElementById('password').value;
if(pass === '123'){
window.location.href = './dashboard';
} else {
document.getElementById('error').style.display = 'block';
}
});
</script>
</body>
</html>
