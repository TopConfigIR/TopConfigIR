<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اشتراک - TopConfigIR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#080c18;color:#e8edf5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111b2e;border:1px solid #1e3050;border-radius:16px;padding:30px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{text-align:center;font-size:24px;font-weight:700;background:linear-gradient(135deg,#00c8ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#6a7fa0;font-size:13px;margin-bottom:20px}
.info{margin:16px 0;padding:14px 16px;background:#0a1222;border-radius:10px;border:1px solid #1e3050}
.info .label{color:#6a7fa0;font-size:12px}
.info .value{font-size:16px;font-weight:600;margin-top:2px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #0f1a2a}
.row:last-child{border-bottom:none}
.status{display:inline-block;padding:3px 14px;border-radius:12px;font-size:12px;font-weight:500}
.status-active{background:#0a2a1a;color:#4ade80}
.status-paused{background:#2a1a0a;color:#fbbf24}
.status-expired{background:#2a0a0a;color:#f87171}
.progress{width:100%;height:6px;background:#0a1222;border-radius:4px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#00c8ff,#0066ff);transition:width 0.5s}
.btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,#00c8ff,#0066ff);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;text-align:center;cursor:pointer;text-decoration:none;margin-top:14px;transition:opacity 0.3s}
.btn:hover{opacity:0.85}
.btn-outline{background:transparent;border:1px solid #1e3050;color:#b0c4e0}
.btn-outline:hover{background:#1a2640}
</style>
</head>
<body>
<div class="card">
<div class="logo">⚡ TopConfigIR</div>
<p class="sub">اطلاعات اشتراک شما</p>

<div class="info">
<div class="label">نام کاربر</div>
<div class="value" id="userName">---</div>
</div>

<div class="info" style="margin-top:0">
<div class="label">وضعیت</div>
<div id="statusBadge">---</div>
</div>

<div class="info" style="margin-top:0">
<div class="label">مصرف ترافیک</div>
<div style="display:flex;justify-content:space-between;margin-top:4px">
<span id="usageText">0 / 0 GB</span>
<span id="usagePercent">0%</span>
</div>
<div class="progress"><div class="progress-bar" id="usageBar" style="width:0%"></div></div>
</div>

<div class="info" style="margin-top:0">
<div class="row"><span class="label">مصرف روزانه</span><span id="dailyText">0 / 0</span></div>
<div class="row"><span class="label">تاریخ انقضا</span><span id="expiryText">∞</span></div>
<div class="row"><span class="label">روزهای باقیمانده</span><span id="daysLeft">∞</span></div>
</div>

<button class="btn" onclick="copyLink()">📋 کپی لینک اشتراک</button>
<button class="btn btn-outline" onclick="window.location.href='/'">🏠 بازگشت</button>
</div>

<script>
async function loadData(){
try{
const url = new URL(window.location.href);
const user = url.searchParams.get('user') || '';
const res = await fetch(`/api/users?user=${encodeURIComponent(user)}`);
const data = await res.json();
if(data.success && data.user){
const u = data.user;
document.getElementById('userName').textContent = u.name;
const status = u.isPaused ? 'paused' : (u.expiryMs && Date.now()>u.expiryMs ? 'expired' : 'active');
const statusMap = {'active':'فعال','paused':'متوقف','expired':'منقضی'};
const classMap = {'active':'status-active','paused':'status-paused','expired':'status-expired'};
document.getElementById('statusBadge').innerHTML = `<span class="status ${classMap[status]}">${statusMap[status]}</span>`;
const total = u.usage?.total || 0;
const limit = u.usage?.limit || 0;
const totalGB = (total/1073741824).toFixed(2);
const limitGB = limit ? (limit/1073741824).toFixed(2) : '∞';
const pct = limit ? Math.min(100,(total/limit)*100).toFixed(1) : 0;
document.getElementById('usageText').textContent = `${totalGB} / ${limitGB} GB`;
document.getElementById('usagePercent').textContent = limit ? `${pct}%` : '∞';
document.getElementById('usageBar').style.width = limit ? `${pct}%` : '0%';
const daily = u.usage?.daily || 0;
const dailyLimit = u.usage?.dailyLimit || 0;
document.getElementById('dailyText').textContent = `${daily} / ${dailyLimit || '∞'}`;
const expiry = u.expiryMs ? new Date(u.expiryMs).toLocaleDateString('fa-IR') : '∞';
document.getElementById('expiryText').textContent = expiry;
if(u.expiryMs){
const days = Math.ceil((u.expiryMs - Date.now()) / 86400000);
document.getElementById('daysLeft').textContent = days > 0 ? `${days} روز` : 'منقضی';
} else {
document.getElementById('daysLeft').textContent = '∞';
}
} else {
document.querySelector('.card').innerHTML = '<div style="text-align:center;padding:20px;color:#f87171">⚠️ کاربر یافت نشد</div>';
}
} catch(e){
document.querySelector('.card').innerHTML = '<div style="text-align:center;padding:20px;color:#f87171">⚠️ خطا در بارگذاری</div>';
}
}

function copyLink(){
const url = window.location.href;
navigator.clipboard?.writeText(url).then(()=>alert('لینک کپی شد!')).catch(()=>{
const ta = document.createElement('textarea');
ta.value = url;
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
ta.remove();
alert('لینک کپی شد!');
});
}

loadData();
</script>
</body>
</html>
